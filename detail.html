<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>商品详情 - 九五优品二手</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/8.0.0/swiper-bundle.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- 头部 -->
    <header class="header">
        <div class="header-content">
            <a href="javascript:history.back()" class="header-back">
                <i class="fas fa-chevron-left"></i>
            </a>
            <div class="header-title">商品详情</div>
            <div class="header-actions">
                <a href="index.html" style="color: white; margin-right: 15px;">
                    <i class="fas fa-home"></i>
                </a>
                <a href="cart.html" style="color: white;">
                    <i class="fas fa-shopping-cart"></i>
                </a>
            </div>
        </div>
    </header>

    <!-- 主内容 -->
    <main class="main-content">
        <!-- 商品图片轮播 -->
        <div class="product-images">
            <div class="swiper-container product-swiper">
                <div class="swiper-wrapper">
                    <!-- 图片由JS动态生成 -->
                </div>
                <div class="swiper-pagination"></div>
            </div>
        </div>

        <!-- 商品信息 -->
        <div class="product-detail">
            <div class="product-header">
                <h1 id="productName">商品名称</h1>
                <div class="product-price" id="productPrice">
                    <span class="current-price">¥0.00</span>
                    <span class="original-price">¥0.00</span>
                </div>
                <div class="product-tags">
                    <span class="tag">正品保证</span>
                    <span class="tag">七天退换</span>
                    <span class="tag">顺丰包邮</span>
                </div>
            </div>

            <div class="product-info-section">
                <h3>商品信息</h3>
                <div class="info-grid" id="productInfo">
                    <!-- 商品信息由JS动态生成 -->
                </div>
            </div>

            <div class="product-desc-section">
                <h3>商品描述</h3>
                <div class="product-desc" id="productDesc">
                    <!-- 商品描述由JS动态生成 -->
                </div>
            </div>

            <div class="product-specs-section">
                <h3>详细规格</h3>
                <div class="specs-list" id="productSpecs">
                    <!-- 规格由JS动态生成 -->
                </div>
            </div>
        </div>
    </main>

    <!-- 底部操作栏 -->
    <div class="detail-footer">
        <div class="footer-actions">
            <a href="user.html" class="footer-icon">
                <i class="fas fa-user"></i>
                <span>我的</span>
            </a>
            <a href="cart.html" class="footer-icon">
                <i class="fas fa-shopping-cart"></i>
                <span>购物车</span>
            </a>
            <button class="btn btn-add-cart" onclick="addToCart()">加入购物车</button>
            <button class="btn btn-buy" onclick="buyNow()">立即购买</button>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/8.0.0/swiper-bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script>
        let currentProduct = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            // 获取URL参数
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id')) || 1;
            
            // 查找商品
            const allProducts = [...mallData.newProducts, ...mallData.hotProducts];
            for (const category in mallData.categories) {
                allProducts.push(...mallData.categories[category]);
            }
            
            currentProduct = allProducts.find(p => p.id === productId) || allProducts[0];
            
            // 渲染商品详情
            renderProductDetail();
        });
        
        // 渲染商品详情
        function renderProductDetail() {
            if (!currentProduct) return;
            
            // 更新页面标题
            document.title = currentProduct.name + ' - 九五优品二手';
            document.getElementById('productName').textContent = currentProduct.name;
            
            // 更新价格
            const priceElement = document.getElementById('productPrice');
            priceElement.innerHTML = `
                <span class="current-price">${formatPrice(currentProduct.price)}</span>
                ${currentProduct.originalPrice ? `
                    <span class="original-price">${formatPrice(currentProduct.originalPrice)}</span>
                ` : ''}
            `;
            
            // 渲染图片轮播
            const swiperWrapper = document.querySelector('.swiper-wrapper');
            for (let i = 1; i <= 3; i++) {
                const slide = document.createElement('div');
                slide.className = 'swiper-slide';
                slide.innerHTML = `
                    <img src="${currentProduct.image}" alt="${currentProduct.name}" 
                         onerror="this.src='images/default-product.jpg'" style="width: 100%; height: 100%; object-fit: cover;">
                `;
                swiperWrapper.appendChild(slide);
            }
            
            // 初始化轮播
            new Swiper('.product-swiper', {
                loop: true,
                pagination: {
                    el: '.swiper-pagination',
                    clickable: true,
                }
            });
            
            // 渲染商品信息
            const productInfo = document.getElementById('productInfo');
            const infoItems = [
                { label: '品牌', value: currentProduct.brand || '未知' },
                { label: '型号', value: currentProduct.specs || currentProduct.type || '标准版' },
                { label: '成色', value: currentProduct.condition || '95新' },
                { label: '库存', value: '充足' },
                { label: '快递', value: '顺丰包邮' }
            ];
            
            productInfo.innerHTML = infoItems.map(item => `
                <div class="info-item">
                    <span class="info-label">${item.label}：</span>
                    <span class="info-value">${item.value}</span>
                </div>
            `).join('');
            
            // 渲染商品描述
            const productDesc = document.getElementById('productDesc');
            productDesc.innerHTML = currentProduct.description || currentProduct.name;
            
            // 渲染详细规格
            const productSpecs = document.getElementById('productSpecs');
            const specsItems = [
                { label: '商品编号', value: `PROD${currentProduct.id.toString().padStart(6, '0')}` },
                { label: '上架时间', value: '2024-12-15' },
                { label: '发货地', value: '广东省深圳市' },
                { label: '保修政策', value: '店铺保修1年' },
                { label: '适用人群', value: '通用' }
            ];
            
            if (currentProduct.config) {
                specsItems.unshift({ label: '配置参数', value: currentProduct.config });
            }
            
            productSpecs.innerHTML = specsItems.map(item => `
                <div class="spec-item">
                    <span class="spec-label">${item.label}：</span>
                    <span class="spec-value">${item.value}</span>
                </div>
            `).join('');
            
            // 添加CSS样式
            const style = document.createElement('style');
            style.textContent = `
                .product-images {
                    width: 100%;
                    height: 300px;
                    overflow: hidden;
                }
                
                .product-swiper {
                    width: 100%;
                    height: 100%;
                }
                
                .product-detail {
                    padding: 15px;
                    background: var(--jd-white);
                    border-radius: 12px 12px 0 0;
                    margin-top: -20px;
                    position: relative;
                }
                
                .product-header {
                    margin-bottom: 20px;
                }
                
                .product-header h1 {
                    font-size: 18px;
                    font-weight: 600;
                    margin-bottom: 10px;
                    line-height: 1.4;
                }
                
                .current-price {
                    color: var(--jd-price);
                    font-size: 24px;
                    font-weight: bold;
                }
                
                .original-price {
                    color: var(--jd-text-lighter);
                    text-decoration: line-through;
                    font-size: 16px;
                    margin-left: 10px;
                }
                
                .product-tags {
                    display: flex;
                    gap: 8px;
                    margin-top: 10px;
                }
                
                .tag {
                    background: #ffe7e7;
                    color: var(--jd-red);
                    padding: 4px 8px;
                    border-radius: 4px;
                    font-size: 12px;
                }
                
                .product-info-section,
                .product-desc-section,
                .product-specs-section {
                    margin: 20px 0;
                    padding: 15px 0;
                    border-bottom: 1px solid var(--jd-border);
                }
                
                .product-info-section:last-child,
                .product-desc-section:last-child,
                .product-specs-section:last-child {
                    border-bottom: none;
                }
                
                h3 {
                    font-size: 16px;
                    font-weight: 600;
                    margin-bottom: 12px;
                    padding-left: 8px;
                    border-left: 3px solid var(--jd-red);
                }
                
                .info-grid {
                    display: grid;
                    grid-template-columns: repeat(2, 1fr);
                    gap: 12px;
                }
                
                .info-item {
                    display: flex;
                }
                
                .info-label {
                    color: var(--jd-text-light);
                    min-width: 60px;
                }
                
                .info-value {
                    flex: 1;
                }
                
                .product-desc {
                    line-height: 1.6;
                    color: var(--jd-text);
                }
                
                .specs-list {
                    display: flex;
                    flex-direction: column;
                    gap: 10px;
                }
                
                .spec-item {
                    display: flex;
                    padding: 8px 0;
                    border-bottom: 1px solid var(--jd-border);
                }
                
                .spec-item:last-child {
                    border-bottom: none;
                }
                
                .spec-label {
                    color: var(--jd-text-light);
                    min-width: 80px;
                }
                
                .spec-value {
                    flex: 1;
                }
                
                .detail-footer {
                    position: fixed;
                    bottom: 0;
                    left: 0;
                    right: 0;
                    background: var(--jd-white);
                    border-top: 1px solid var(--jd-border);
                    padding: 10px 15px;
                    z-index: 1000;
                    max-width: 750px;
                    margin: 0 auto;
                }
                
                .footer-actions {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                }
                
                .footer-icon {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    text-decoration: none;
                    color: var(--jd-text-light);
                    font-size: 10px;
                }
                
                .footer-icon i {
                    font-size: 20px;
                    margin-bottom: 2px;
                }
                
                .btn-add-cart,
                .btn-buy {
                    flex: 1;
                    padding: 12px;
                    border: none;
                    border-radius: 6px;
                    font-size: 16px;
                    font-weight: 600;
                    cursor: pointer;
                }
                
                .btn-add-cart {
                    background: #ff9500;
                    color: white;
                }
                
                .btn-buy {
                    background: var(--jd-red);
                    color: white;
                }
                
                .header-back {
                    color: white;
                    text-decoration: none;
                    font-size: 18px;
                }
                
                .header-actions {
                    display: flex;
                    align-items: center;
                }
            `;
            document.head.appendChild(style);
        }
        
        // 加入购物车
        function addToCart() {
            if (!currentProduct) return;
            
            storage.addToCart(currentProduct, 1);
            showToast('商品已加入购物车');
        }
        
        // 立即购买
        function buyNow() {
            if (!currentProduct) return;
            
            // 先将商品加入购物车
            storage.addToCart(currentProduct, 1);
            
            // 跳转到结算页
            navigateTo('order.html');
        }
    </script>
</body>
</html>
